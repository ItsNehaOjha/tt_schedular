# Render Configuration File
# Reference: https://render.com/docs/deploy-render-yaml

services:
  - type: web
    name: timetable-app
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromDatabase:
          name: timetable-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false  # Will be set to the service URL automatically
    plan: free
    autoDeploy: true

databases:
  - name: timetable-db
    databaseName: timetable
    user: timetable_user
    plan: free
    ipAllowList:
      - ip: 0.0.0.0/0  # For development, restrict in production
        comment: Allow all IPs (temporary for development)
